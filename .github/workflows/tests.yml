# ──────────────────────────────────────────────────────────────────────────
# CI: ejecuta la suite de tests con pytest en cada push / PR sobre main.
#
# ¿Qué hace?
#   1. Prepara un Ubuntu con Python 3.12 (la versión objetivo del proyecto).
#   2. Cachea los paquetes pip para que las siguientes ejecuciones sean
#      más rápidas.
#   3. Instala dependencias de `requirements.txt`.
#   4. Corre `pytest` — el umbral mínimo de cobertura (70%) está en
#      `pytest.ini`, si baja de ahí el workflow falla.
#
# TODO (futuro):
#   - Matriz de versiones de Python (3.12, 3.13) cuando sea estable.
#   - Job aparte con `ruff` / `black --check` para estilo.
#   - Publicar el informe de cobertura en Codecov o similar.
# ──────────────────────────────────────────────────────────────────────────
name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar tests (pytest + cobertura)
        run: pytest -v
